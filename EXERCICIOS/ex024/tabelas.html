<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Complexas</title>

    <style>
        table { 
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 
            'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; color: black;
            background-color: rgba(145, 138, 138, 0.7);
            width: 500px; 
            height: 40px; 
            padding: 2px;
            border-collapse: collapse;}
        

        td{ border: 1px solid black;
        }

        .branco {background-color: white;}

    </style>

</head>

<body>

                <tr>

                </tr>
                <tr>

                </tr><tr>
                    <td class="branco"> Rio de Janeiro </td> <td class="branco"> 17 223 547 </td> <td class="branco"> Zimbabwe </td>
                </tr>
                    <td class="branco"> Bahia </td> <td class="branco"> 14 870 907 </td> <td class="branco"> Benim </td>
                </tr>
                    <td class="branco"> Parana </td> <td class="branco"> 11 890 517	 </td> <td class="branco"> Haiti </td>
                </tr>
                    <td class="branco"> Pernambuco </td> <td class="branco"> 9 562 007 </td> <td class="branco"> Israel </td>
               
       </tbody>

    </table>




</body>
</html>
